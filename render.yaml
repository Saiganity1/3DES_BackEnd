services:
  - type: web
    name: cit-inventory-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate
      gunicorn inventory_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set these in Render dashboard (do NOT commit secrets)
      # - key: SECRET_KEY
      # - key: INVENTORY_3DES_KEY_B64
      # - key: ALLOWED_HOSTS
      # - key: DATABASE_URL
      # - key: CORS_ALLOW_ALL_ORIGINS
      # - key: CORS_ALLOWED_ORIGINS
